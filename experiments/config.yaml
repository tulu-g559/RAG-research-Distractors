embedding_model: intfloat/e5-small-v2

generator_models:
  gpt41mini:
    provider: openrouter
    model: openai/gpt-4.1-mini
  llama31:
    provider: groq
    model: llama-3.1-8b-instant

top_k: 5
num_questions:
  gpt41mini: 100
  llama31: 100
random_seed: 42

dataset_subset:
  squad:
    documents: 200
    questions: 50
  hotpot:
    documents: 200
    questions: 50

distractor_count:
  - 0
  - 1
  - 3
  - 5

distractor_type:
  - topical
  - hard_negative
  - paraphrased_contradiction
